name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: whispercli-windows-x64.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: whispercli-linux-x64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: whispercli-macos-x64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: whispercli-macos-arm64.tar.gz

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install LLVM for bindgen
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            choco install llvm -y --no-progress
            echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew install llvm
            echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
          else
            sudo apt-get update
            sudo apt-get install -y libclang-dev libasound2-dev
          fi
      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package
        shell: pwsh
        run: ./scripts/package-release.ps1 -Target "${{ matrix.target }}" -AssetName "${{ matrix.asset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
      - name: Publish npm package
        if: ${{ env.NPM_TOKEN != '' }}
        uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: |
          cp ../README.md README.md
          cp ../LICENSE LICENSE
          npm publish --access public --provenance
